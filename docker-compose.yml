services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://webchat:webchat@postgres:5432/webchat
      # Demo-only default so `docker compose up` works zero-config.
      # Override via a real secret (shell env or .env) before any real deployment.
      SESSION_SECRET: ${SESSION_SECRET:-hackathon-demo-secret-do-not-use-in-prod}
      NODE_ENV: production
      PORT: 3000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@webchat.local
      APP_URL: http://localhost:3000
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webchat
      POSTGRES_PASSWORD: webchat
      POSTGRES_DB: webchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init-test-db.sql:/docker-entrypoint-initdb.d/10-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"   # Web UI
    restart: unless-stopped

volumes:
  uploads:
  pgdata:
