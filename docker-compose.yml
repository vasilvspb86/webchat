version: '3.9'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://webchat:webchat@postgres:5432/webchat
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      NODE_ENV: production
      PORT: 3000
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webchat
      POSTGRES_PASSWORD: webchat
      POSTGRES_DB: webchat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webchat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  uploads:
  pgdata:
